name: Deploy Flutter Web

on:
  push:
    branches:
      - main

# Necessary permissions for gh-pages deployment
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        # Explicitly setting Node 24 ensures the runner environment
        # is aligned before any JS-based actions execute.
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        # Added --release flag to ensure an optimized production build
        run: flutter build web --release

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web